<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyView Drone</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0b1a2b] text-white">

<!-- HEADER -->
<header class="fixed top-0 left-0 w-full z-50 bg-[#0b1a2b] border-t border-white border-b">
  <div class="flex justify-between items-center px-6 py-4">

    <!-- LOGO + NOME -->
    <div class="flex items-center gap-2">
      <img src="logo.png" class="w-8 h-8">
      <h1 class="text-xl font-semibold">
        <span class="text-blue-400">Sky</span><span class="text-white">View</span>
      </h1>
    </div>

    <!-- MENU DESKTOP -->
    <nav class="hidden md:flex gap-8 text-sm">
      <a href="#inicio" class="hover:border-b border-white">Home</a>
      <a href="#servicos" class="hover:border-b border-white">Serviços</a>
      <a href="#portfolio" class="hover:border-b border-white">Portfólio</a>
      <a href="#contato" class="hover:border-b border-white">Contato</a>
    </nav>

    <!-- MENU MOBILE -->
    <button onclick="toggleMenu()" class="md:hidden text-2xl">☰</button>
  </div>

  <!-- DROPDOWN MOBILE -->
  <div id="menu" class="hidden flex flex-col text-center bg-[#0b1a2b] pb-4">
    <a href="#inicio" class="py-2">Home</a>
    <a href="#servicos" class="py-2">Serviços</a>
    <a href="#portfolio" class="py-2">Portfólio</a>
    <a href="#contato" class="py-2">Contato</a>
  </div>
</header>

<!-- HERO -->
<section id="inicio" class="h-screen flex flex-col justify-center items-center text-center px-4 pt-24">
  <h2 class="text-5xl font-bold mb-6">Imagens Aéreas</h2>

  <div class="grid md:grid-cols-2 gap-8 mb-8">
    <div>
      <div class="text-3xl">✔</div>
      <p>Equipamento de Qualidade</p>
    </div>
    <div>
      <div class="text-3xl">🌍</div>
      <p>Atuação em Ribeirão Preto e região</p>
    </div>
  </div>

  <a href="https://wa.me/5516997681179" class="bg-blue-500 px-6 py-3 rounded-xl hover:bg-blue-400">Solicitar Orçamento</a>
</section>

<!-- SERVIÇOS -->
<section id="servicos" class="p-12">
  <h3 class="text-3xl font-bold text-center mb-8">Serviços</h3>
  <div class="grid md:grid-cols-2 gap-6">
    <a href="#" class="bg-[#111] p-6 rounded-xl">Eventos</a>
    <a href="#" class="bg-[#111] p-6 rounded-xl">Imobiliário</a>
    <a href="#" class="bg-[#111] p-6 rounded-xl">Empresas</a>
    <a href="#" class="bg-[#111] p-6 rounded-xl">Inspeção Predial</a>
    <a href="#" class="bg-[#111] p-6 rounded-xl">Corretoria</a>
    <a href="#" class="bg-[#111] p-6 rounded-xl">Turismo</a>
  </div>
</section>

<!-- CONTATO / REDES -->
<section id="contato" class="text-center p-12">
  <h3 class="text-3xl font-bold mb-4">Contato</h3>

  <div class="flex justify-center gap-6 text-2xl mt-6">
    <a href="#">📸</a>
    <a href="#">🎵</a>
    <a href="#">📘</a>
    <a href="https://wa.me/5516997681179">💬</a>
  </div>
</section>

<script>
function toggleMenu(){
  const menu = document.getElementById('menu');
  menu.classList.toggle('hidden');
}
</script>

</body>
</html>
